<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Synchro LOS Parser</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* (same styling as before, unchanged for brevity) */
</style>
</head>

<body>
<div class="card">
<h1>Synchro LOS Parser</h1>
<p class="subtitle">Drop in a Synchro report (.txt) and get an Excel LOS summary instantly.</p>

<div class="drop-zone" id="dropZone" onclick="fileInput.click()">
<p>Click or drag & drop your Synchro report</p>
<div id="fileName"></div>
</div>

<input type="file" id="fileInput" accept=".txt"/>
<button id="parseBtn" disabled>Generate Excel File</button>

<div id="status"></div>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const parseBtn = document.getElementById('parseBtn');
const statusEl = document.getElementById('status');

let fileContent = '';

/* ================= FILE LOAD ================= */
fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    fileContent = e.target.result;
    parseBtn.disabled = false;
    statusEl.innerText = "File loaded";
  };
  reader.readAsText(f);
});

/* ================= MAIN ================= */
parseBtn.onclick = () => {
  const rows = parseSynchro(fileContent);
  const sorted = sortRows(rows);
  buildExcel(sorted);
  statusEl.innerText = "Done!";
};

/* ================= SORTING ================= */
const approachOrder = ["EB","WB","NB","SB"];
const laneOrderUnsignalized = ["L","T","R"];
const laneOrderSignalized = ["L","T","R","Approach"];

function sortRows(rows){
  return rows.sort((a,b)=>{
    if (a.node !== b.node) return a.node - b.node;

    const apDiff = approachOrder.indexOf(a.approach) - approachOrder.indexOf(b.approach);
    if (apDiff !== 0) return apDiff;

    const laneOrder = a.control === "S" ? laneOrderSignalized : laneOrderUnsignalized;

    if (a.approach === "Overall") return 1;
    if (b.approach === "Overall") return -1;

    return laneOrder.indexOf(a.laneGroup) - laneOrder.indexOf(b.laneGroup);
  });
}

/* ================= PARSER ================= */
function parseSynchro(text){
  const blocks = text.split('\f');
  const results = [];

  blocks.forEach(block=>{
    const header = block.match(/^(\d+):\s*(.+?)\t(.+)$/m);
    if (!header) return;

    const node = parseInt(header[1]);
    const intName = header[2];
    const period = header[3];

    const isSignal = /Intersection Signal Delay/i.test(block);
    const control = isSignal ? "S" : "U";

    if (isSignal){
      parseSignal(block,node,intName,period,control,results);
    } else {
      parseUnsignal(block,node,intName,period,control,results);
    }
  });

  return results;
}

/* ================= UNSIGNALIZED ================= */
function parseUnsignal(block,node,intName,period,control,results){
  const lines = block.split('\n');

  let laneDelays={}, laneLOS={};

  lines.forEach(line=>{
    if (/HCM Ctrl Dly/.test(line)){
      const parts = line.split('\t');
      parts.forEach((p,i)=>{
        const val = parseFloat(p);
        if (!isNaN(val)){
          const key = "Lane"+i;
          laneDelays[key] = round(val);
        }
      });
    }
  });

  Object.keys(laneDelays).forEach(k=>{
    results.push({
      node,control,intName,period,
      approach:"EB",
      laneGroup:"T",
      delay:laneDelays[k],
      los:""
    });
  });
}

/* ================= SIGNALIZED ================= */
function parseSignal(block,node,intName,period,control,results){
  const delayMatch = block.match(/Intersection Signal Delay.*?([\d.]+)/);
  const losMatch = block.match(/Intersection LOS.*?([A-F])/);

  if (delayMatch){
    results.push({
      node,control,intName,period,
      approach:"Overall",
      laneGroup:"",
      delay:round(parseFloat(delayMatch[1])),
      los:losMatch ? losMatch[1] : ""
    });
  }
}

/* ================= ROUNDING ================= */
function round(val){
  return val != null ? Math.round(val * 10)/10 : val;
}

/* ================= EXCEL ================= */
function buildExcel(rows){
  const wb = XLSX.utils.book_new();

  const periods = {
    "AM":[],
    "PM":[],
    "SAT":[]
  };

  rows.forEach(r=>{
    if (/AM/i.test(r.period)) periods.AM.push(r);
    else if (/PM/i.test(r.period)) periods.PM.push(r);
    else periods.SAT.push(r);
  });

  Object.entries(periods).forEach(([name,data])=>{
    const ws = XLSX.utils.json_to_sheet(data);
    XLSX.utils.book_append_sheet(wb,ws,name);
  });

  XLSX.writeFile(wb,"LOS_Summary.xlsx");
}
</script>
</body>
</html>
